apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: iris3d

resources:
  - deployment.yaml
  - service.yaml
  - configmap.yaml
  - ingress.yaml

commonLabels:
  app.kubernetes.io/name: iris3d
  app.kubernetes.io/version: "2.0.0"

images:
  - name: iris3d/gateway
    newTag: latest
  - name: iris3d/inference
    newTag: latest
