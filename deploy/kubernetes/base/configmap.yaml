apiVersion: v1
kind: ConfigMap
metadata:
  name: iris3d-config
  labels:
    app: iris3d
data:
  redis-host: "iris3d-redis:6379"
  otel-endpoint: "otel-collector:4317"
  default-voxel-size: "0.01"
  cache-ttl: "300"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: iris3d-inference-config
  labels:
    app: iris3d
    component: inference
data:
  config.yaml: |
    server:
      host: "0.0.0.0"
      port: 50052
      max_workers: 4

    model:
      path: "/app/models/midas_v31_dpt_large.onnx"
      input_height: 384
      input_width: 384
      use_gpu: true

    camera:
      defaults:
        focal_length_x: 0
        focal_length_y: 0
        principal_point_x: 0
        principal_point_y: 0

    depth:
      scale_factor: 1.0
      min_depth: 0.1
      max_depth: 100.0
