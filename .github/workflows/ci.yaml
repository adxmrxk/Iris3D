name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  GO_VERSION: '1.21'
  PYTHON_VERSION: '3.11'
  NODE_VERSION: '20'

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install Buf
        uses: bufbuild/buf-setup-action@v1

      - name: Lint Protos
        run: buf lint proto/

      - name: Go Lint
        uses: golangci/golangci-lint-action@v3
        with:
          working-directory: go/
          version: latest

      - name: Python Lint
        run: |
          pip install ruff
          ruff check python/

  test-go:
    name: Test Go
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Generate Protos
        run: |
          go install google.golang.org/protobuf/cmd/protoc-gen-go@latest
          go install google.golang.org/grpc/cmd/protoc-gen-go-grpc@latest
          go install connectrpc.com/connect/cmd/protoc-gen-connect-go@latest
          make go-proto

      - name: Run Tests
        working-directory: go/
        run: |
          go mod download
          go test -v -race -coverprofile=coverage.out ./...

      - name: Upload Coverage
        uses: codecov/codecov-action@v3
        with:
          files: go/coverage.out
          flags: go

  test-python:
    name: Test Python
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install Dependencies
        working-directory: python/
        run: |
          pip install -r requirements.txt
          pip install pytest pytest-cov

      - name: Run Tests
        working-directory: python/
        run: |
          pytest -v --cov=. --cov-report=xml

      - name: Upload Coverage
        uses: codecov/codecov-action@v3
        with:
          files: python/coverage.xml
          flags: python

  test-web:
    name: Test Web
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install Dependencies
        working-directory: web/
        run: npm ci

      - name: Build
        working-directory: web/
        run: npm run build

  build:
    name: Build Images
    needs: [lint, test-go, test-python]
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Gateway Image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: go/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/gateway:${{ github.sha }}
            ghcr.io/${{ github.repository }}/gateway:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build Inference Image
        uses: docker/build-push-action@v5
        with:
          context: python/
          file: python/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/inference:${{ github.sha }}
            ghcr.io/${{ github.repository }}/inference:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build Web Image
        uses: docker/build-push-action@v5
        with:
          context: web/
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/viewer:${{ github.sha }}
            ghcr.io/${{ github.repository }}/viewer:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
